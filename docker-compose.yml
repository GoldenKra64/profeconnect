# PostgreSQL local para desarrollo y pruebas (AmigoJolive)
# Arranque: docker compose up -d postgres
# Cadena típica en backend/.env:
# DIRECT_URL="postgresql://amigo:amigo_dev@localhost:5432/amigojolive"
# DATABASE_URL="postgresql://amigo:amigo_dev@localhost:5432/amigojolive"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: amigo
      POSTGRES_PASSWORD: amigo_dev
      POSTGRES_DB: amigojolive
    volumes:
      - amigojolive_pg:/var/lib/postgresql/data

volumes:
  amigojolive_pg:
