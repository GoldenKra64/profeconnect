kotlin.code.style=official
android.useAndroidX=true
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m
org.jetbrains.compose.experimental.jscanvas.enabled=true
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
kotlin.incremental=true
kotlin.js.ir.output.granularity=per-module

# Suprime el warning de compatibilidad KMP <-> AGP
kotlin.mpp.androidGradlePluginCompatibility.nowarn=true

# Cachés de proyecto y Kotlin fuera de OneDrive para evitar errores
# "not a regular file" causados por la sincronización de OneDrive.
org.gradle.projectcachedir=C:/GradleProjectCache/amigojolive
kotlin.project.persistent.dir=C:/GradleProjectCache/amigojolive-kotlin