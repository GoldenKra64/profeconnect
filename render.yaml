services:
  - type: web
    name: amigojolive
    runtime: node
    rootDir: .
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://amigojolive.onrender.com
      - key: CHATBOT_API_KEY
        sync: false
      - key: VITE_API_URL
        value: https://amigojolive-production.up.railway.app/api/v1
      - key: VITE_SOCKET_URL
        value: https://amigojolive-production.up.railway.app
